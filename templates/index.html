<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siber Güvenlik Süiti | Merkle-Hellman</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    
    <style>
        /* --- Temel Tasarım (Glassmorphism) --- */
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top left, #1e293b, #0f172a 100%); color: #f8fafc; margin: 0; padding: 30px; display: flex; justify-content: center; min-height: 100vh; box-sizing: border-box; }
        .container { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); width: 100%; max-width: 1000px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        h1 { text-align: center; margin-top: 0; font-size: 26px; font-weight: 800; background: linear-gradient(to right, #3b82f6, #10b981); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        h3 { color: #cbd5e1; font-size: 15px; margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; margin-bottom: 12px; }

        /* --- Sekme Sistemi --- */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid rgba(255,255,255,0.05); padding-bottom: 10px; justify-content: center;}
        .tab-btn { background: transparent; color: #94a3b8; border: none; padding: 10px 20px; font-size: 16px; font-weight: 600; cursor: pointer; border-radius: 8px; transition: 0.3s; width: auto;}
        .tab-btn:hover { color: white; background: rgba(255,255,255,0.05); }
        .tab-btn.active { background: rgba(59, 130, 246, 0.2); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); }
        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }

        /* --- Ortak Bileşenler --- */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .box { background: rgba(15, 23, 42, 0.4); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); }
        button { padding: 10px 15px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; color: white; width: 100%; margin-top: 10px; }
        button:active { transform: scale(0.98); }
        .btn-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .btn-green { background: linear-gradient(135deg, #10b981, #059669); }
        .btn-purple { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .btn-dark { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #cbd5e1; }
        .btn-dark:hover { background: rgba(255,255,255,0.1); color: white; }
        
        textarea { width: 100%; height: 70px; background: rgba(0,0,0,0.3); color: #34d399; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; font-family: 'Fira Code', monospace; font-size: 13px; box-sizing: border-box; outline: none; resize: vertical;}
        textarea:focus { border-color: #3b82f6; }
        input[type="file"], input[type="text"] { width: 100%; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px dashed rgba(255,255,255,0.2); color: #94a3b8; font-size: 13px; box-sizing: border-box; outline: none;}
        input[type="text"]:focus { border-color: #3b82f6; border-style: solid; }
        
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-safe { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }

        /* --- Chat ve Sniffer Özel --- */
        .chat-box { height: 250px; background: #000; border-radius: 8px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);}
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; word-wrap: break-word; font-size: 13px;}
        .msg.me { background: #3b82f6; align-self: flex-end; border-bottom-right-radius: 0;}
        .msg.other { background: #334155; align-self: flex-start; border-bottom-left-radius: 0;}
        .sniffer-box { height: 310px; background: #050b14; color: #10b981; padding: 10px; font-size: 11px; overflow-y: auto; border-radius: 8px; border: 1px solid #064e3b; font-family: 'Fira Code', monospace;}
        
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); border-left: 4px solid #3b82f6; color: white; padding: 15px; border-radius: 8px; font-size: 13px; font-weight: 500; animation: slideIn 0.3s forwards; box-shadow: 0 10px 25px rgba(0,0,0,0.3);}
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="container">
    <h1>🛡️ Kapsamlı Siber Güvenlik Süiti</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab-cloud')">📁 Dosya & Metin (Sunucu Tabanlı)</button>
        <button class="tab-btn" onclick="switchTab('tab-e2ee')">💬 Canlı Ağ Tüneli (E2EE Client-Side)</button>
    </div>

    <div id="tab-cloud" class="tab-content active">
        <div class="box" style="margin-bottom: 20px;">
            <h3 style="display: flex; justify-content: space-between;">
                🔑 Anahtar Yönetim Merkezi <span id="securityBadge" class="badge" style="display: none;"></span>
            </h3>
            <div style="display: flex; gap: 10px;">
                <button class="btn-green" onclick="generateKeys()">Yeni Üret</button>
                <button class="btn-dark" onclick="exportKeys()">Yedekle</button>
                <button class="btn-dark" onclick="document.getElementById('importFile').click()">Yükle (.json)</button>
                <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importKeys(event)">
            </div>
            <p style="text-align: center; font-size: 12px; color: #94a3b8; margin-top: 10px; margin-bottom: 0;">Durum: <span id="keyStatus" style="color: #cbd5e1;">Beklemede</span></p>
        </div>

        <div class="grid-2">
            <div class="box">
                <h3>📝 Metin Şifrele</h3>
                <textarea id="plainText" placeholder="Mesajınızı yazın..."></textarea>
                <button class="btn-blue" onclick="encryptText()">🔒 Şifrele</button>
            </div>
            <div class="box">
                <h3>🔏 Şifreli Metin</h3>
                <textarea id="cipherText" placeholder="Sonuç..."></textarea>
                <button class="btn-purple" onclick="decryptText()">🔓 Şifreyi Çöz</button>
            </div>
        </div>

        <div class="box" style="margin-bottom: 20px; border-color: rgba(16, 185, 129, 0.3);">
            <h3 style="color: #10b981; border-bottom-color: rgba(16, 185, 129, 0.2);">✅ Çözülmüş Metin Sonucu</h3>
            <div id="decryptedResult" style="min-height: 40px; padding: 12px; background: rgba(0,0,0,0.4); border: 1px dashed rgba(16, 185, 129, 0.5); border-radius: 8px; color: #34d399; font-family: 'Fira Code', monospace; font-size: 14px; word-wrap: break-word;">
                <span style="color: #475569;">Çözülen mesaj burada görüntülenecek...</span>
            </div>
        </div>

        <div class="grid-2">
            <div class="box">
                <h3>📁 Dosya Kilitle</h3>
                <input type="file" id="encryptFileInput">
                <button class="btn-blue" onclick="encryptFile()">🔒 Şifreli İndir (.enc)</button>
            </div>
            <div class="box">
                <h3>📄 Dosya Çöz</h3>
                <input type="file" id="decryptFileInput" accept=".enc">
                <button class="btn-purple" onclick="decryptFile()">🔓 Orijinal İndir</button>
            </div>
        </div>
    </div>

    <div id="tab-e2ee" class="tab-content">
        <div class="grid-2">
            <div class="box" style="display: flex; flex-direction: column;">
                <h3>💬 Uçtan Uca Şifreli Ağ (E2EE)</h3>
                <p style="font-size: 11px; color: #94a3b8; margin-top: -5px;" id="socketStatus">Bağlanıyor...</p>
                <div class="chat-box" id="chatBox"></div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="msgInput" placeholder="Gizli mesaj..." autocomplete="off">
                    <button class="btn-green" style="width: 100px; margin-top: 0;" onclick="sendMessage()">Gönder</button>
                </div>
            </div>
            <div class="box" style="padding: 10px;">
                <h3 style="margin: 5px 0 10px 5px; color: #10b981;">📡 Ağ İzleyici (Packet Sniffer)</h3>
                <div class="sniffer-box" id="snifferBox"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- GENEL FONKSİYONLAR ---
    function showToast(msg) {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
        
        // Hata mesajıysa kenarlığı kırmızı yap
        if(msg.includes("⚠️")) t.style.borderLeftColor = "#ef4444";
        
        c.appendChild(t); 
        setTimeout(() => { 
            t.style.animation = 'fadeOut 0.3s forwards'; 
            setTimeout(() => t.remove(), 300); 
        }, 3000);
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }

    // ==========================================
    // BÖLÜM 1: SUNUCU TABANLI ŞİFRELEME (TAB 1)
    // ==========================================
    let currentPublicKey = null; let currentPrivateKey = null;

    async function generateKeys() {
        showToast("Anahtarlar sunucuda üretiliyor...");
        try {
            const res = await fetch('/api/generate_keys'); const data = await res.json();
            currentPublicKey = data.public_key; currentPrivateKey = data.private_key;
            document.getElementById('keyStatus').innerText = "Hafızaya Alındı";
            document.getElementById('keyStatus').style.color = "#34d399";
            const b = document.getElementById('securityBadge'); b.style.display = 'inline-block';
            b.className = data.is_vulnerable ? 'badge badge-danger' : 'badge badge-safe';
            b.innerText = data.is_vulnerable ? `⚠️ ZAYIF (${data.density})` : `✅ GÜVENLİ (${data.density})`;
            showToast("Anahtar başarıyla üretildi!");
        } catch(e) {
            showToast("⚠️ Sunucu bağlantı hatası!");
        }
    }
    
    function exportKeys() {
        if(!currentPublicKey) return showToast("⚠️ Önce anahtar üretin veya yükleyin!");
        const a = document.createElement('a');
        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({public: currentPublicKey, private: currentPrivateKey}));
        a.download = "keys.json"; a.click(); showToast("Anahtarlar başarıyla yedeklendi.");
    }
    
    function importKeys(e) {
        const file = e.target.files[0];
        if (!file) return;
        const r = new FileReader();
        r.onload = function(ev) {
            try {
                const k = JSON.parse(ev.target.result); currentPublicKey = k.public; currentPrivateKey = k.private;
                document.getElementById('keyStatus').innerText = "Yüklendi";
                document.getElementById('keyStatus').style.color = "#3b82f6";
                document.getElementById('securityBadge').style.display='none';
                showToast("Anahtar başarıyla aktarıldı!");
            } catch(err) {
                showToast("⚠️ Bozuk veya geçersiz dosya!");
            }
        }; r.readAsText(file);
    }
    
    async function encryptText() {
        if (!currentPublicKey) return showToast("⚠️ Lütfen önce anahtar üretin veya yükleyin!");
        const text = document.getElementById('plainText').value;
        if (!text) return showToast("⚠️ Şifrelenecek bir metin girmediniz!");

        const res = await fetch('/api/encrypt', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:text, public_key:currentPublicKey})});
        if(res.ok) {
            const data = await res.json(); document.getElementById('cipherText').value = JSON.stringify(data.ciphertext);
            showToast("Metin başarıyla şifrelendi!");
        } else {
            showToast("⚠️ Şifreleme başarısız oldu!");
        }
    }
    
    async function decryptText() {
        if (!currentPrivateKey) return showToast("⚠️ Lütfen önce anahtar üretin veya yükleyin!");
        const cipherVal = document.getElementById('cipherText').value;
        if (!cipherVal) return showToast("⚠️ Çözülecek şifreli metin yok!");

        try {
            const c = JSON.parse(cipherVal);
            const res = await fetch('/api/decrypt', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ciphertext:c, private_key:currentPrivateKey})});
            if(res.ok) {
                const data = await res.json(); document.getElementById('decryptedResult').innerText = data.plaintext;
                showToast("Şifre başarıyla kırıldı!");
            } else {
                showToast("⚠️ Anahtar bu şifreyi çözemedi!");
            }
        } catch(e) {
            showToast("⚠️ Hatalı şifreli metin formatı!");
        }
    }
    
    function encryptFile() {
        if (!currentPublicKey) return showToast("⚠️ Lütfen önce anahtar üretin veya yükleyin!");
        const fileInput = document.getElementById('encryptFileInput');
        if (fileInput.files.length === 0) return showToast("⚠️ Lütfen bir dosya seçin.");

        const file = fileInput.files[0]; const r = new FileReader();
        showToast("Dosya analiz ediliyor ve şifreleniyor...");
        r.onload = async function(e) {
            const res = await fetch('/api/encrypt', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:e.target.result, public_key:currentPublicKey})});
            const data = await res.json(); const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(data.ciphertext)], {type:'application/json'})); a.download = file.name+".enc"; a.click();
            showToast("Dosya şifrelendi ve indirildi!");
        }; r.readAsDataURL(file);
    }
    
    function decryptFile() {
        if (!currentPrivateKey) return showToast("⚠️ Lütfen önce anahtar üretin veya yükleyin!");
        const fileInput = document.getElementById('decryptFileInput');
        if (fileInput.files.length === 0) return showToast("⚠️ Lütfen bir .enc dosyası seçin.");

        const file = fileInput.files[0]; const r = new FileReader();
        showToast("Dosya şifresi kırılıyor...");
        r.onload = async function(e) {
            try {
                const res = await fetch('/api/decrypt', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ciphertext:JSON.parse(e.target.result), private_key:currentPrivateKey})});
                const data = await res.json(); const a = document.createElement('a');
                a.href = data.plaintext; a.download = file.name.replace('.enc',''); a.click();
                showToast("Orijinal dosya indirildi!");
            } catch(err) {
                showToast("⚠️ Dosya çözülürken bir hata oluştu.");
            }
        }; r.readAsText(file);
    }

// ==========================================
    // BÖLÜM 2: E2EE CANLI SOHBET & AĞ (TAB 2)
    // ==========================================
    
    // JS Tabanlı Kripto Motoru (16-Bit UTF-16 Destekli)
    function egcdJS(a, b) { if(a===0) return [b,0,1]; let [g,y,x]=egcdJS(b%a, a); return [g, x-Math.floor(b/a)*y, y]; }
    function modInverseJS(a, m) { let [g,x,y]=egcdJS(a,m); return ((x%m)+m)%m; }
    
    function generateKeyPairJS(n=16) { // 16-bit'e yükseltildi (Türkçe karakter desteği için)
        let w=[], t=0; for(let i=0;i<n;i++){ let v=Math.floor(Math.random()*10)+t+1; w.push(v); t+=v; }
        let q=Math.floor(Math.random()*50)+t+1; let r=Math.floor(Math.random()*(q-2))+2;
        while(egcdJS(r,q)[0]!==1) r=Math.floor(Math.random()*(q-2))+2;
        return { public: w.map(v=>(v*r)%q), private: {w,q,r} };
    }
    
    function encryptJS(msg, pk) {
        let c=[]; for(let i=0;i<msg.length;i++){
            let b=msg.charCodeAt(i).toString(2).padStart(16,'0'); let s=0;
            for(let j=0;j<16;j++) s+=parseInt(b[j])*pk[j]; c.push(s);
        } return c;
    }
    
    function decryptJS(c, sk) {
        let {w,q,r}=sk; let ri=modInverseJS(r,q); let res="";
        for(let i=0;i<c.length;i++){
            let cp=(c[i]*ri)%q; let b=[];
            for(let j=w.length-1;j>=0;j--) { if(cp>=w[j]){b.unshift('1'); cp-=w[j];} else b.unshift('0'); }
            res+=String.fromCharCode(parseInt(b.join(''),2));
        } return res;
    }

    const socket = io();
    const myName = "Ajan_" + Math.floor(Math.random()*1000);
    const myE2EKeys = generateKeyPairJS();
    
    let targetE2EPublicKey = null;
    let targetE2EUsername = null; // YENİ: Paketin kimin için olduğunu bilmemiz lazım
    let knownPeers = new Set(); 

    function logSniffer(t) { 
        const s = document.getElementById('snifferBox'); 
        s.innerHTML += `<div style="margin-bottom:5px; border-bottom:1px dashed #064e3b; padding-bottom:3px;">${t}</div>`;
        s.scrollTop = s.scrollHeight; 
    }

    socket.on('connect', () => {
        document.getElementById('socketStatus').innerText = `Kimlik: ${myName} | Anahtar Paylaşılıyor...`;
        logSniffer(`<span style="color:#3b82f6">[AĞ]</span> Bağlanıldı. Açık Anahtar ağa yayınlanıyor.`);
        socket.emit('broadcast_public_key', { username: myName, publicKey: myE2EKeys.public });
    });

    socket.on('receive_public_key', (data) => {
        if (knownPeers.has(data.username)) return;
        
        knownPeers.add(data.username);
        targetE2EPublicKey = data.publicKey;
        targetE2EUsername = data.username; // Hedefi hafızaya al
        
        document.getElementById('socketStatus').innerText = `🟢 E2EE Tüneli Aktif (Hedef: ${data.username})`;
        logSniffer(`<span style="color:#3b82f6">[HANDSHAKE]</span> ${data.username} anahtarı alındı: [${data.publicKey.slice(0,3)}...]`);
        socket.emit('broadcast_public_key', { username: myName, publicKey: myE2EKeys.public });
    });

    function sendMessage() {
        if(!targetE2EPublicKey) return showToast("⚠️ Ağda şifreyi çözecek kimse yok!");
        const t = document.getElementById('msgInput').value; if(!t) return;
        
        document.getElementById('chatBox').innerHTML += `<div class="msg me">${t}</div>`;
        const cipher = encryptJS(t, targetE2EPublicKey);
        
        logSniffer(`<span style="color:#ef4444">[TCP YÜKÜ (GİDEN)]</span> ${cipher.slice(0,5).join(',')}...`);
        
        // YENİ: Paketin içine 'target' etiketini de koyuyoruz
        socket.emit('send_encrypted_message', { 
            sender: myName, 
            target: targetE2EUsername, 
            ciphertext: cipher 
        });
        
        document.getElementById('msgInput').value = '';
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

    socket.on('receive_encrypted_message', (data) => {
        // YENİ GÜVENLİK DUVARI: Mesaj bana gelmediyse (başka sekmeye gittiyse) sessizce yoksay!
        if (data.target && data.target !== myName) return;

        logSniffer(`<span style="color:#ef4444">[TCP YÜKÜ (GELEN)]</span> ${data.ciphertext.slice(0,5).join(',')}...`);
        try {
            const dec = decryptJS(data.ciphertext, myE2EKeys.private);
            document.getElementById('chatBox').innerHTML += `<div class="msg other"><b>${data.sender}:</b> ${dec}</div>`;
            logSniffer(`[ÇÖZÜLDÜ] Mesaj başarıyla okundu.`);
        } catch(e) {
            document.getElementById('chatBox').innerHTML += `<div class="msg other" style="background:#ef4444;">[BOZUK PAKET]</div>`;
        }
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    });

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
